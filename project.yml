name: SheepAI
options:
  bundleIdPrefix: com.sheepai
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  SheepAI:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: SheepAI
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sheepai.hud
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - target: Widgets

  Widgets:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Widgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sheepai.hud.widgets
        INFOPLIST_FILE: Widgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: ""
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
    preBuildScripts:
      - name: "Generate Widgets Info.plist"
        script: /tmp/gen_widget_plist.sh ${SRCROOT}/Widgets/Info.plist
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles:
          - $(SRCROOT)/Widgets/Info.plist
